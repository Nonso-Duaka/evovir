# ── Task ──────────────────────────────────────────────────────────────────────
# binary     : label 0/1, BCEWithLogitsLoss, single logit output
# multiclass : label 0..N-1, CrossEntropyLoss, N logit outputs
task: binary
num_classes: 2                     # ignored for binary; set to 3 for three-class etc.

# ── Data ─────────────────────────────────────────────────────────────────────
accessions_dir: data/accessions             # ViraLM accession lists (for reference)
data_dir: data                              # metadata.csv + fasta/ go here
embeddings_dir: outputs/embeddings

# ── Model ────────────────────────────────────────────────────────────────────
model_name: evo2_7b_base
layer_name: blocks.28.mlp.l3
embedding_dim: 4096

# ── Sequence handling ─────────────────────────────────────────────────────────
max_seq_len: 8000
window_stride: 4000
min_seq_len: 500
max_genome_len: 300000
ambiguous_base_threshold: 0.05

# ── GPU ───────────────────────────────────────────────────────────────────────
precision: bf16
extraction_batch_size: 8
num_workers: 4
compile_model: false
multi_gpu: true

# ── Training ──────────────────────────────────────────────────────────────────
head_type: mlp
hidden_dim: 512
dropout: 0.3
batch_size: 512
learning_rate: 1.0e-4
weight_decay: 1.0e-4
epochs: 50
patience: 10
val_fraction: 0.15
test_fraction: 0.15
seed: 42
output_dir: outputs
